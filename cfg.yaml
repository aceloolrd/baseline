# Data
DATASET_PATH: "./data/splits"

# Model
ARCH: "unetplusplus"           # unet | unetplusplus | deeplabv3plus | fpn | pspnet | pan
ENCODER_NAME: "resnext50_32x4d"
ENCODER_WEIGHTS: "ssl"         # imagenet | ssl | swsl | null
IN_CHANNELS: 1
OUT_CLASSES: 1
MODE: "binary"                 # binary | multiclass | multilabel

# Training
LR: 0.0001
BATCH_SIZE: 4
EPOCHS: 50
SEED: 42
PRECISION: "32"                # 32 | 16-mixed | bf16-mixed

# Hardware
ACCELERATOR: "gpu"
NUM_WORKERS: 4

# Experiment
DEFAULT_ROOT_DIR: "experiments"
EXPERIMENT: "Unet++"
CKPT_PATH: null                # path to resume from, null = train from scratch
